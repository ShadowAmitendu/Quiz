<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MCQ Quiz</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
			rel="stylesheet" />
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<button
			id="theme-toggle"
			class="theme-toggle"
			type="button"
			aria-label="Toggle dark mode"
			aria-pressed="false">
			<span class="theme-toggle-icon" aria-hidden="true">
				<svg
					class="theme-icon theme-icon-moon"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round">
					<path d="M20.9 13.5A8.4 8.4 0 0 1 10.5 3.1a8.5 8.5 0 1 0 10.4 10.4Z" />
				</svg>
				<svg
					class="theme-icon theme-icon-sun"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round">
					<circle cx="12" cy="12" r="4" />
					<path d="M12 2v2" />
					<path d="M12 20v2" />
					<path d="m4.93 4.93 1.41 1.41" />
					<path d="m17.66 17.66 1.41 1.41" />
					<path d="M2 12h2" />
					<path d="M20 12h2" />
					<path d="m6.34 17.66-1.41 1.41" />
					<path d="m19.07 4.93-1.41 1.41" />
				</svg>
			</span>
			<span class="theme-toggle-label">Dark mode</span>
		</button>

		<!-- SCREEN 1: SUBJECT SELECT -->
		<div id="screen-home" class="screen active">
			<div class="home-wrap">
				<div class="home-header">
					<p class="eyebrow">MCQ Practice</p>
					<h1 class="title">What are you<br />studying today?</h1>
				</div>
				<div id="subject-grid" class="subject-grid"></div>
				<div id="home-loading" class="loading-msg">Loading subjects…</div>
				<div id="home-error" class="error-msg" style="display: none"></div>
			</div>
		</div>

		<!-- SCREEN 2: TOPIC SELECT -->
		<div id="screen-topics" class="screen">
			<div class="home-wrap">
				<button class="back-btn" onclick="goHome()">← Subjects</button>
				<div class="home-header" style="margin-top: 1rem">
					<p class="eyebrow" id="topic-eyebrow"></p>
					<h1 class="title" id="topic-title"></h1>
				</div>
				<div id="topic-list" class="topic-list"></div>
			</div>
		</div>

		<!-- SCREEN 3: QUIZ -->
		<div id="screen-quiz" class="screen">
			<div class="quiz-wrap">
				<div class="quiz-topbar">
					<button class="back-btn" onclick="goTopics()">← Topics</button>
					<div class="quiz-top-meta">
						<div class="meta" id="meta"></div>
						<div class="prog-text" id="prog-text"></div>
					</div>
				</div>
				<div class="prog-bar-wrap">
					<div class="prog-bar" id="prog-bar"></div>
				</div>
				<div class="quiz-stage">
					<div class="qcard" id="qcard">
						<p class="qnum" id="qnum"></p>
						<p class="qtext" id="qtext"></p>
						<div class="options" id="options"></div>
					</div>
				</div>
				<div class="quiz-bottombar">
					<div class="feedback is-hidden" id="feedback">
						<div class="feedback-inner" id="feedback-inner"></div>
						<div class="reason" id="reason"></div>
					</div>
					<div class="nav-row">
						<button
							class="btn-next"
							id="btn-next"
							onclick="nextQuestion()"
							style="visibility: hidden; pointer-events: none">
							Next question →
						</button>
					</div>
					<p class="key-hint">
						Press 1-4 to answer, Space for next, S to skip.
					</p>
				</div>
			</div>
		</div>

		<!-- SCREEN 4: RESULTS -->
		<div id="screen-results" class="screen">
			<div class="home-wrap" style="text-align: center">
				<p class="eyebrow">Quiz complete</p>
				<h1 class="title score-title" id="score-pct"></h1>
				<p class="subtitle" id="score-sub"></p>
				<div class="score-pills">
					<div class="pill pill-correct">
						<span id="r-correct">0</span><small>Correct</small>
					</div>
					<div class="pill pill-wrong">
						<span id="r-wrong">0</span><small>Wrong</small>
					</div>
				</div>
				<div class="result-actions">
					<button class="btn-outline" onclick="retryQuiz()">
						Retry this quiz
					</button>
					<button class="btn-primary-sm" onclick="goHome()">
						Choose another
					</button>
				</div>
			</div>
		</div>

		<div id="celebration-layer" aria-hidden="true"></div>
		<div class="toast" id="toast"></div>
		<script src="quiz.js"></script>
	</body>
</html>
